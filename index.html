<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Gabriele</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="container">
  <img class="logo" src="assets/img/brutta-per-loghi-e-robe-4-1024x576.webp" alt="Logo Support Gabriele">

  <h1>Supporta Gabriele Rossetti</h1>

  <p>Stiamo raccogliendo fondi per permettere a Gabriele di iscriversi alla scuola guida, i kartisti e il flight team tutto vi pregano di aiutarlo</p>

  <div class="progress">
    <div id="progressBar" class="bar">EUR 400 / EUR 1000</div>
  </div>

  <div class="slider-wrap">
    <label for="donationRange">Dona Ora:</label><br>
    <input id="donationRange" class="slider" type="range" min="0" max="1000" step="10" value="400">
  </div>

  <a class="btn" href="https://www.atac.roma.it/lavora-con-noi" target="_blank" rel="noopener noreferrer">Dona ora</a>

  <div class="payments" aria-label="Metodi di pagamento supportati">
    <img class="payment-logo" src="https://cdn.simpleicons.org/paypal/FFFFFF" alt="PayPal">
    <img class="payment-logo" src="https://cdn.simpleicons.org/stripe/FFFFFF" alt="Stripe">
    <img class="payment-logo" src="https://cdn.simpleicons.org/klarna/FFFFFF" alt="Klarna">
  </div>

  <p style="margin-top:40px; opacity:0.7;">
    Ogni contributo aiuta a raggiungere l’obiettivo.
  </p>
</div>

<script src="assets/js/script.js"></script>

</body>
</html>
